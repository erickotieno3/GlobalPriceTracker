<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Login - Tesco Price Comparison</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-blue-600">Tesco Price Comparison</h1>
      <h2 class="text-xl font-semibold mt-2">Vendor Login</h2>
      <p class="text-gray-600 mt-1">Access your vendor dashboard</p>
    </div>
    
    <div id="error-message" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4 hidden" role="alert">
      <p id="error-text"></p>
    </div>
    
    <form id="login-form" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input 
          id="email" 
          name="email" 
          type="email" 
          required 
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          placeholder="email@example.com"
        >
      </div>
      
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input 
          id="password" 
          name="password" 
          type="password" 
          required 
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          placeholder="••••••••"
        >
      </div>
      
      <div class="flex items-center justify-between">
        <div class="text-sm">
          <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Forgot your password?</a>
        </div>
      </div>
      
      <div>
        <button 
          type="submit" 
          id="submit-button"
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        >
          Sign in
        </button>
      </div>
    </form>
    
    <div class="mt-6">
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">New vendor?</span>
        </div>
      </div>
      
      <div class="mt-6">
        <button
          id="register-button"
          class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Register as a vendor
        </button>
      </div>
    </div>
    
    <div class="mt-6 bg-gray-50 p-4 rounded border border-gray-200">
      <h3 class="text-sm font-medium text-gray-700 mb-2">Demo Credentials:</h3>
      <ul class="text-xs text-gray-600 space-y-1">
        <li><strong>Tesco:</strong> tesco@vendor.com / VendorTesco!2024#</li>
        <li><strong>Walmart:</strong> walmart@vendor.com / WalmartVend!2024#</li>
        <li><strong>Amazon:</strong> amazon@vendor.com / AmazonVend!2024#</li>
      </ul>
    </div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('login-form');
      const submitButton = document.getElementById('submit-button');
      const errorMessage = document.getElementById('error-message');
      const errorText = document.getElementById('error-text');
      const registerButton = document.getElementById('register-button');
      
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Disable the button during login attempt
        submitButton.disabled = true;
        submitButton.innerText = 'Signing in...';
        errorMessage.classList.add('hidden');
        
        try {
          const response = await fetch('/api/vendor/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, password }),
            credentials: 'include',
          });
          
          const data = await response.json();
          
          if (response.ok) {
            console.log('Login successful', data);
            window.location.href = '/vendor-dashboard';
          } else {
            errorText.textContent = data.message || 'Invalid email or password';
            errorMessage.classList.remove('hidden');
          }
        } catch (error) {
          console.error('Login error:', error);
          errorText.textContent = 'There was a problem connecting to the server';
          errorMessage.classList.remove('hidden');
        } finally {
          submitButton.disabled = false;
          submitButton.innerText = 'Sign in';
        }
      });
      
      registerButton.addEventListener('click', function() {
        // In a real application, this would redirect to a registration page
        alert('Vendor registration will be implemented in the next phase.');
      });
    });
  </script>
</body>
</html>
