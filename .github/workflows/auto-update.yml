name: Auto-Update - Blog, Prices & Commit

on:
  schedule:
    # Run daily at 2:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      generate_blog:
        description: 'Generate new blog posts'
        required: false
        default: 'true'
      update_prices:
        description: 'Update prices and stock'
        required: false
        default: 'true'
      commit_push:
        description: 'Auto-commit and push'
        required: false
        default: 'true'

jobs:
  auto-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 📝 Generate blog posts
        if: github.event.inputs.generate_blog != 'false'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/auto-blog-generator.mjs

      - name: 💰 Update prices and stock
        if: github.event.inputs.update_prices != 'false'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/auto-price-updater.mjs

      - name: 🔧 Configure git
        run: |
          git config --global user.name "Global Price Comparison Bot"
          git config --global user.email "bot@global-price-comparison.dev"

      - name: 📤 Commit and push changes
        if: github.event.inputs.commit_push != 'false'
        continue-on-error: true
        run: |
          node scripts/auto-commit-push.mjs

      - name: 📝 Create summary
        if: always()
        run: |
          echo "## 🤖 Auto-Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Blog Generation: $([ -d 'public/blog' ] && echo "Completed" || echo "Skipped")" >> $GITHUB_STEP_SUMMARY
          echo "✅ Price Update: $([ -f 'data/products.json' ] && echo "Completed" || echo "Skipped")" >> $GITHUB_STEP_SUMMARY
          echo "✅ Git Commit: $(git log -1 --pretty=%B | head -1)" >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Auto-update workflow failed. Check the logs for details.'
            })
